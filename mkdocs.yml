site_name: PR Risk Scorer
site_url: https://fasterapiweb.github.io/pr-risk-scorer/
site_description: A GitHub Action that scores pull requests by structural risk and posts a detailed breakdown as a PR comment.
repo_name: FasterApiWeb/pr-risk-scorer
repo_url: https://github.com/FasterApiWeb/pr-risk-scorer
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep-orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep-orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Signals: signals.md
  - Using as a Skill: using-as-skill.md
  - Contributing: contributing.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
