name: 'PR Risk Scorer'
description: 'Scores pull requests by structural risk (files changed, complexity, coverage, dead code, migrations)'
author: 'FasterApiWeb'

branding:
  icon: 'alert-triangle'
  color: 'orange'

inputs:
  github-token:
    description: 'GitHub token for reading PR data'
    required: true
  config-path:
    description: 'Path (relative to workspace) to JSON config file'
    required: false
    default: '.github/pr-risk-scorer.json'

outputs:
  risk-score:
    description: 'The computed risk score (0-100)'
  risk-label:
    description: 'Risk label: LOW, MEDIUM, or HIGH'

runs:
  using: 'node20'
  main: 'dist/index.js'
