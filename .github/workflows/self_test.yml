name: Self Test

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  build-and-test:
    name: Build, Typecheck & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Build dist bundle
        run: npm run build

      - name: Verify dist/index.js exists
        run: test -f dist/index.js

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  score-pr:
    name: Score This PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Run PR Risk Scorer against this PR
        id: risk
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config-path: '.github/pr-risk-scorer.json'

      - name: Print risk score
        run: |
          echo "Risk score: ${{ steps.risk.outputs.risk-score }}"
          echo "Risk label: ${{ steps.risk.outputs.risk-label }}"
